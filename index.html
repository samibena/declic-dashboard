<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Déclic — Dashboard Financier V3</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
:root{--red:#E30613;--red-d:#B80510;--gray:#4A4A4A;--bg:#fff;--bg2:#f5f5f5;--bg3:#eaeaea;--text:#1a1a1a;--text2:#666;--card:#fff;--brd:#e0e0e0;--shd:rgba(0,0,0,.06);--grn:#27ae60;--org:#f39c12;--blu:#2980b9;--dgr:#e74c3c;--prp:#8e44ad}
.dark{--bg:#121212;--bg2:#1e1e1e;--bg3:#2a2a2a;--text:#e0e0e0;--text2:#999;--card:#1e1e1e;--brd:#333;--shd:rgba(0,0,0,.3)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);transition:background .3s,color .3s;font-size:13px}
#login-screen{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg)}
.login-box{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:40px;text-align:center;width:340px;box-shadow:0 8px 32px var(--shd)}
.login-box img{width:140px;margin-bottom:24px}
.login-box input{width:100%;padding:12px;border:1px solid var(--brd);border-radius:8px;font-size:14px;background:var(--bg2);color:var(--text);margin-bottom:12px;outline:none}
.login-box input:focus{border-color:var(--red)}
.login-box button{width:100%;padding:12px;background:var(--red);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.login-box button:hover{background:var(--red-d)}
.login-err{color:var(--dgr);font-size:12px;margin-top:6px;display:none}
#app{display:none}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--card);border-bottom:1px solid var(--brd);position:sticky;top:0;z-index:100}
.topbar-l{display:flex;align-items:center;gap:10px}
.topbar-l img{height:28px}
.topbar-t{font-size:15px;font-weight:700;color:var(--red)}
.topbar-r{display:flex;align-items:center;gap:12px}
.sync-d{width:7px;height:7px;border-radius:50%;background:var(--grn);display:inline-block}
.sync-d.off{background:var(--dgr)}
.sync-l{font-size:11px;color:var(--text2)}
.tbtn{background:none;border:1px solid var(--brd);border-radius:6px;padding:4px 8px;cursor:pointer;font-size:13px;color:var(--text)}
.health-bar{display:flex;align-items:center;gap:12px;padding:12px 20px;background:var(--bg2);border-bottom:1px solid var(--brd)}
.health-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.health-dot.green{background:var(--grn)}.health-dot.orange{background:var(--org)}.health-dot.red{background:var(--dgr)}
.health-txt{font-size:12px;font-weight:600}
.nav{display:flex;gap:3px;padding:6px 20px;background:var(--bg2);overflow-x:auto;border-bottom:1px solid var(--brd)}
.nav button{padding:7px 14px;border:none;background:transparent;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;border-radius:5px;white-space:nowrap;transition:all .2s}
.nav button.active{background:var(--red);color:#fff}
.nav button:hover:not(.active){background:var(--bg3)}
.content{padding:20px;max-width:1400px;margin:0 auto}
.module{display:none}.module.active{display:block}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:20px}
.card{background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:14px;box-shadow:0 1px 4px var(--shd)}
.card-l{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.card-v{font-size:22px;font-weight:700}
.card-s{font-size:11px;color:var(--text2);margin-top:2px}
.red{color:var(--dgr)}.green{color:var(--grn)}.orange{color:var(--org)}.blue{color:var(--blu)}
.alrt{border-radius:6px;padding:10px 14px;margin-bottom:10px;font-size:12px}
.alrt-w{background:#fef3cd;border:1px solid #ffc107;color:#856404}
.alrt-d{background:#f8d7da;border:1px solid #f5c6cb;color:#721c24}
.alrt-i{background:#d1ecf1;border:1px solid #bee5eb;color:#0c5460}
.dark .alrt-w{background:#3d3200;border-color:#665200;color:#ffc107}
.dark .alrt-d{background:#3d0a0a;border-color:#5c1010;color:#f5c6cb}
.dark .alrt-i{background:#0a2d33;border-color:#0c5460;color:#bee5eb}
.tw{overflow-x:auto;margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--bg2);color:var(--text2);font-weight:600;text-align:left;padding:8px 10px;border-bottom:2px solid var(--brd);cursor:pointer;user-select:none;white-space:nowrap}
th:hover{background:var(--bg3)}
td{padding:8px 10px;border-bottom:1px solid var(--brd)}
tr:hover td{background:var(--bg2)}
.tag{display:inline-block;padding:2px 6px;border-radius:3px;font-size:10px;font-weight:600}
.tag-u{background:#f8d7da;color:#721c24}.tag-a{background:#d4edda;color:#155724}.tag-i{background:#e2e3e5;color:#383d41}
.tag-r{background:#f5c6cb;color:#721c24}.tag-w{background:#fff3cd;color:#856404}.tag-b{background:#cce5ff;color:#004085}
.dark .tag-u{background:#5c1010;color:#f5c6cb}.dark .tag-a{background:#0d3d1a;color:#a3d9b1}.dark .tag-i{background:#333;color:#999}
.dark .tag-r{background:#5c1010;color:#f5c6cb}.dark .tag-w{background:#3d3200;color:#ffc107}.dark .tag-b{background:#003366;color:#cce5ff}
.stitle{font-size:16px;font-weight:700;margin-bottom:12px;padding-bottom:6px;border-bottom:2px solid var(--red);display:flex;align-items:center;gap:6px}
.acc{border:1px solid var(--brd);border-radius:8px;margin-bottom:10px;overflow:hidden}
.acc-h{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg2);cursor:pointer;font-weight:600;font-size:13px;user-select:none}
.acc-h:hover{background:var(--bg3)}
.acc-h .arr{transition:transform .2s;font-size:10px}
.acc-h.open .arr{transform:rotate(90deg)}
.acc-b{display:none;padding:10px 14px}
.acc-h.open+.acc-b{display:block}
.cht{background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:14px;margin-bottom:16px}
.cht h4{font-size:13px;margin-bottom:8px}
.frow{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.fgrp{flex:1;min-width:140px}
.fgrp label{display:block;font-size:11px;color:var(--text2);margin-bottom:3px;font-weight:600}
.fgrp input,.fgrp select,.fgrp textarea{width:100%;padding:6px 10px;border:1px solid var(--brd);border-radius:5px;font-size:12px;background:var(--bg);color:var(--text)}
.btn{padding:6px 12px;border:none;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-p{background:var(--red);color:#fff}.btn-p:hover{background:var(--red-d)}
.btn-s{background:var(--bg3);color:var(--text)}.btn-d{background:var(--dgr);color:#fff}
.btn-g{background:var(--grn);color:#fff}
.btn-sm{padding:3px 8px;font-size:11px}
.mo{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.mo.show{display:flex}
.mo-c{background:var(--card);border-radius:10px;padding:20px;width:90%;max-width:520px;max-height:80vh;overflow-y:auto}
.mo-c h3{font-size:15px;margin-bottom:12px}
.tbar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.upload-zone{border:2px dashed var(--brd);border-radius:8px;padding:20px;text-align:center;cursor:pointer;transition:border-color .2s;margin-bottom:12px}
.upload-zone:hover{border-color:var(--red)}
.upload-zone.dragover{border-color:var(--red);background:rgba(227,6,19,.05)}
.pip-c{background:var(--card);border:1px solid var(--brd);border-radius:6px;padding:12px;margin-bottom:8px}
.cal-i{display:flex;align-items:flex-start;gap:10px;padding:10px;border-bottom:1px solid var(--brd)}
.cal-d{min-width:75px;font-weight:700;font-size:12px;color:var(--red)}
.caisse-nav{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.caisse-nav button{padding:4px 10px;border:1px solid var(--brd);background:var(--bg2);border-radius:5px;cursor:pointer;font-size:12px;color:var(--text)}
.caisse-nav button:hover{background:var(--bg3)}
.caisse-nav span{font-weight:700;font-size:14px;min-width:100px;text-align:center}
@media(max-width:768px){.cards{grid-template-columns:1fr 1fr}.content{padding:12px}.card-v{font-size:18px}}
@media(max-width:480px){.cards{grid-template-columns:1fr}.frow{flex-direction:column}}
</style>
</head>

function ensureData(){
const s=seed();

if(!Array.isArray(D.charges.logistique))D.charges.logistique=Object.values(D.charges.logistique);

const f=D.charges.fixes;
D.charges.admin=[{id:'a1',nom:'CNSS',montant:f.cnss||43000},{id:'a2',nom:'IR',montant:f.ir||24000}];
D.charges.credits=[{id:'c1',nom:'Eqdom (fin 2027)',montant:f.eqdom||4013},{id:'c2',nom:'Sofac (fin 2027)',montant:f.sofac||8129},{id:'c3',nom:'RCI (fin 2030)',montant:f.rci||3700},{id:'c4',nom:'Saham (fin 2028)',montant:f.saham||12700}];
D.charges.logistique=[{id:'l1',nom:'Loyer',montant:16000},{id:'l2',nom:'Maroc Telecom',montant:4000},{id:'l3',nom:'Eau & Électricité',montant:1500}];
}
if(!D.soldeManuel){
if(D.tresorerie){D.soldeManuel={comptePrincipal:D.tresorerie.comptePrincipal||0,compteBis:D.tresorerie.compteBis||0,caisse:D.tresorerie.caisse||0,date:'2026-03-28'};}
else{D.soldeManuel=s.soldeManuel;}
}
if(!D.historiqueSoldes){
if(D.tresorerie&&D.tresorerie.historique)D.historiqueSoldes=D.tresorerie.historique;
else D.historiqueSoldes=s.historiqueSoldes;
}
if(!D.paiementsEnCours||!Array.isArray(D.paiementsEnCours))D.paiementsEnCours=[];
if(!D.todoAlerts||!Array.isArray(D.todoAlerts))D.todoAlerts=s.todoAlerts;
if(!D.releves||!Array.isArray(D.releves))D.releves=[];
if(!D.seuilAlerte)D.seuilAlerte=100000;
if(!D.dismissedAlerts||!Array.isArray(D.dismissedAlerts))D.dismissedAlerts=[];
if(!D.dettesFiscales)D.dettesFiscales=s.dettesFiscales;
if(!D.caClient2025||!Array.isArray(D.caClient2025))D.caClient2025=s.caClient2025;
if(!D.resultats)D.resultats=s.resultats;
if(!D.pipeline||!Array.isArray(D.pipeline))D.pipeline=s.pipeline;
if(!D.calendrier||!Array.isArray(D.calendrier))D.calendrier=s.calendrier;
if(!D.dettes)D.dettes=s.dettes;
if(!Array.isArray(D.dettes))D.dettes=Object.values(D.dettes);
if(!D.creances)D.creances=s.creances;
if(!Array.isArray(D.creances)){
const old=D.creances;const arr=[];
Object.keys(old).forEach((k,i)=>{const v=old[k];if(v&&v.client){if(!v.id)v.id='cr'+i;if(v.classeeSansSuite===undefined)v.classeeSansSuite=false;if(!Array.isArray(v.factures))v.factures=v.factures?Object.values(v.factures):[];arr.push(v);}});
D.creances=arr.length?arr:s.creances;
}
// Caisse module
if(!D.caisse)D.caisse=s.caisse;
if(!D.caisse.operations)D.caisse.operations=[];
if(!Array.isArray(D.caisse.operations))D.caisse.operations=Object.values(D.caisse.operations);
if(!D.caisse.moisCourant)D.caisse.moisCourant='2026-03';
if(D.caisse.soldeInitial==null)D.caisse.soldeInitial=2945;
// Achats/Ventes modules
if(!D.achats)D.achats={imports:[],recap:[]};
if(!D.achats.imports)D.achats.imports=[];
if(!Array.isArray(D.achats.imports))D.achats.imports=Object.values(D.achats.imports);

if(!D.ventes.recap)D.ventes.recap=[];

// Ensure IDs
D.charges.salaires.forEach((x,i)=>{if(!x.id)x.id='s'+i;});
D.charges.admin.forEach((x,i)=>{if(!x.id)x.id='a'+i;});
D.charges.credits.forEach((x,i)=>{if(!x.id)x.id='c'+i;});

D.creances.forEach((x,i)=>{if(!x.id)x.id='cr'+i;if(x.classeeSansSuite===undefined)x.classeeSansSuite=false;if(!Array.isArray(x.factures))x.factures=x.factures?Object.values(x.factures):[];x.factures.forEach((f,j)=>{if(!f.id)f.id='f'+i+'_'+j;});});
D.pipeline.forEach((x,i)=>{if(!x.id)x.id='p'+i;});
D.calendrier.forEach((x,i)=>{if(!x.id)x.id='cl'+i;});
D.caisse.operations.forEach((x,i)=>{if(!x.id)x.id='co'+i;});
}

// ===== CAISSE: compute solde for tresorerie =====
function getCaisseSolde(){
if(!D||!D.caisse)return D?.soldeManuel?.caisse||2945;
const ops=D.caisse.operations;
if(!ops||!ops.length)return D.caisse.soldeInitial||2945;
// Get current month ops sorted by date
const sorted=[...ops].sort((a,b)=>(a.date||'').localeCompare(b.date||''));
let solde=D.caisse.soldeInitial||0;
sorted.forEach(op=>{solde+=(op.entree||0)-(op.sortie||0);});
return solde;
}

// ===== COMPUTED =====
function getComputedData(){
ensureData();
const c=D.charges;
const totSal=(c.salaires||[]).reduce((s,x)=>s+(x.net||0),0);
const totAdmin=(c.admin||[]).reduce((s,x)=>s+(x.montant||0),0);
const totCred=(c.credits||[]).reduce((s,x)=>s+(x.montant||0),0);
const totLog=(c.logistique||[]).reduce((s,x)=>s+(x.montant||0),0);
const burnRate=totSal+totAdmin+totCred+totLog;
const sm=D.soldeManuel||{comptePrincipal:0,compteBis:0,caisse:0};
const caisseSolde=getCaisseSolde();
const soldeBrut=(sm.comptePrincipal||0)+(sm.compteBis||0)+caisseSolde;
const totPEC=(D.paiementsEnCours||[]).reduce((s,x)=>s+(x.montant||0),0);
const soldeAjuste=soldeBrut-totPEC;
const joursSurvie=burnRate>0?Math.floor(soldeAjuste/(burnRate/30)):999;
const totDettes=D.dettes.reduce((s,x)=>{const paid=x.paiements?x.paiements.reduce((ss,p)=>ss+p.montant,0):0;return s+(x.montant-paid);},0)+D.dettesFiscales.tva+D.dettesFiscales.is;
const today=new Date().toISOString().slice(0,10);
const crActives=D.creances.filter(c=>!c.classeeSansSuite);
const totCreances=crActives.reduce((s,c)=>s+c.factures.reduce((ss,f)=>ss+f.montant,0),0);
const crRetard=crActives.reduce((s,c)=>s+c.factures.filter(f=>f.echeance&&f.echeance<today).reduce((ss,f)=>ss+f.montant,0),0);
const ratioCouv=totDettes>0?(totCreances/totDettes*100):999;
let score=100;
if(joursSurvie<30)score-=40;else if(joursSurvie<60)score-=20;
if(ratioCouv<50)score-=30;else if(ratioCouv<80)score-=15;
if(crRetard>100000)score-=20;else if(crRetard>50000)score-=10;
const hist=Object.values(D.historiqueSoldes);
if(hist.length>=3){const trend=hist[hist.length-1]-hist[hist.length-3];if(trend<-100000)score-=10;}
const health=score>=70?'green':score>=40?'orange':'red';
const healthLabel=score>=70?'Santé financière correcte':score>=40?'Vigilance requise':'Situation critique';
return{totSal,totAdmin,totCred,totLog,burnRate,soldeBrut,soldeAjuste,totPEC,joursSurvie,totDettes,totCreances,crRetard,ratioCouv,health,healthLabel,score,caisseSolde};
}

function renderCreances(){
const today=new Date().toISOString().slice(0,10);
const crActives=D.creances.filter(c=>!c.classeeSansSuite);
const crClassees=D.creances.filter(c=>c.classeeSansSuite);
const totActives=crActives.reduce((s,c)=>s+c.factures.reduce((ss,f)=>ss+f.montant,0),0);
const totRetard=crActives.reduce((s,c)=>s+c.factures.filter(f=>f.echeance&&f.echeance<today).reduce((ss,f)=>ss+f.montant,0),0);
const agingTag=(ech)=>{if(!ech)return'<span class="tag tag-i">N/A</span>';const d=daysBetween(ech,today);if(d<=0)return'<span class="tag tag-a">À jour</span>';if(d<=30)return'<span class="tag tag-w">J+'+d+'</span>';if(d<=60)return'<span class="tag tag-u">J+'+d+'</span>';return'<span class="tag tag-r">J+'+d+'</span>';};
let html=`<div class="stitle">📊 Créances clients</div>

<div class="card"><div class="card-l">Délai moyen encaissement</div><div class="card-v orange">${calcDelaiMoyen()} j</div></div>
</div>
<div style="margin-bottom:10px"><button class="btn btn-p" onclick="window.addCreanceClient()">+ Client</button></div>`;
crActives.forEach(c=>{
const accOpen=openAccs.has('cr_'+c.id);
const totC=c.factures.reduce((s,f)=>s+f.montant,0);
let facRows=c.factures.map(f=>`<tr><td>${f.ref}</td><td>${f.desc}</td><td style="text-align:right;font-weight:600">${fmtK(f.montant)}</td><td>${fmtD(f.echeance)}</td><td>${agingTag(f.echeance)}</td><td><button class="btn btn-sm btn-s" onclick="window.editFacture('${c.id}','${f.id}')">✎</button> <button class="btn btn-sm btn-d" onclick="window.delFacture('${c.id}','${f.id}')">✕</button></td></tr>`).join('');
facRows+=`<tr><td colspan="6"><button class="btn btn-sm btn-p" onclick="window.addFacture('${c.id}')">+ Facture</button></td></tr>`;
const isFaible=c.client.toLowerCase().includes('prob')||c.client.toLowerCase().includes('faible')||c.client.toLowerCase().includes('anciennes');
const csBtn=isFaible?`<button class="btn btn-sm btn-d" onclick="event.stopPropagation();window.classerSansSuite('${c.id}')">Classer sans suite</button>`:'';
html+=`<div class="acc"><div class="acc-h ${accOpen?'open':''}" onclick="window.toggleAcc('cr_${c.id}')"><span>${c.client} — <b>${fmtK(totC)}</b></span><div style="display:flex;gap:6px;align-items:center"><button class="btn btn-sm btn-s" onclick="event.stopPropagation();window.editCreanceClient('${c.id}')">✎</button>${csBtn}<span class="arr">▶</span></div></div><div class="acc-b"><table><thead><tr><th>Réf.</th><th>Description</th><th style="text-align:right">Montant</th><th>Échéance</th><th>Aging</th><th></th></tr></thead><tbody>${facRows}</tbody></table></div></div>`;
});
if(crClassees.length){
html+=`<div class="stitle" style="margin-top:16px;border-color:var(--text2)">🗃️ Classées sans suite</div>`;
crClassees.forEach(c=>{const totC=c.factures.reduce((s,f)=>s+f.montant,0);
html+=`<div style="padding:8px;border:1px solid var(--brd);border-radius:6px;margin-bottom:6px;opacity:.6;display:flex;justify-content:space-between;align-items:center"><span>${c.client} — ${fmtK(totC)}</span><button class="btn btn-sm btn-g" onclick="window.reactiver('${c.id}')">Réactiver</button></div>`;});}
document.getElementById('mod-creances').innerHTML=html;
}
function calcDelaiMoyen(){
const today=new Date().toISOString().slice(0,10);
let total=0,count=0;
D.creances.filter(c=>!c.classeeSansSuite).forEach(c=>{c.factures.forEach(f=>{if(f.echeance){const d=daysBetween(f.echeance,today);if(d>0){total+=d;count++;}}});});
return count>0?Math.round(total/count):0;
}

// ===== XLSX PARSER FUNCTIONS =====
function parseRecapSheet(ws){
const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
const results=[];
for(let i=0;i<data.length;i++){
const row=data[i];
if(!row||!row.length)continue;
// Find rows with actual data (skip headers, totals, empty)
const firstCell=row.find(c=>c!=null&&String(c).trim()!=='');
if(!firstCell)continue;
const str=String(firstCell).trim().toLowerCase();
if(str==='fournisseurs'||str==='client'||str==='total'||str==='total:'||str==='recap'||str==='recap frns'||str==='montant ttc'||str==='')continue;
// Look for numeric columns - montant TTC, réglé, reste
const nums=row.filter(c=>c!=null&&typeof c==='number');
if(nums.length>=2){
// Pattern: Name, MontantTTC, MontantRegle, ResteAPayer
let name=null,ttc=0,regle=0,reste=0;
// Find the name (first non-null string)
for(const c of row){if(c!=null&&typeof c==='string'&&c.trim()!==''){name=c.trim();break;}}
if(!name&&typeof firstCell==='string')name=firstCell.trim();
if(!name)continue;
// Find numbers in order
const numVals=[];
for(const c of row){if(c!=null&&typeof c==='number')numVals.push(c);}
if(numVals.length>=3){ttc=numVals[0];regle=numVals[1];reste=numVals[2];}
else if(numVals.length===2){ttc=numVals[0];reste=numVals[1];regle=ttc-reste;}
else if(numVals.length===1){ttc=numVals[0];}
if(ttc===0&&regle===0&&reste===0)continue;
results.push({name,montantTTC:Math.round(Math.abs(ttc)),montantRegle:Math.round(Math.abs(regle)),resteAPayer:Math.round(Math.abs(reste))});
}
}
return results;
}

window.handleAchatsXLSX=async(files)=>{
if(!files||!files.length)return;
const status=document.getElementById('achats-import-status');
status.innerHTML='<p>⏳ Traitement en cours...</p>';
try{
const file=files[0];
const buf=await file.arrayBuffer();
const wb=XLSX.read(buf,{type:'array'});
// Find Recap sheet
const recapName=wb.SheetNames.find(s=>s.trim().toLowerCase().startsWith('recap'));
if(!recapName){status.innerHTML='<div class="alrt alrt-d">Feuille "Recap" introuvable dans le fichier.</div>';return;}
const ws=wb.Sheets[recapName];
const parsed=parseRecapSheet(ws);
if(!parsed.length){status.innerHTML='<div class="alrt alrt-d">Aucune donnée exploitable trouvée dans la feuille Recap.</div>';return;}
// Map to achats recap
D.achats.recap=parsed.map(p=>({fournisseur:p.name,montantTTC:p.montantTTC,montantRegle:p.montantRegle,resteAPayer:p.resteAPayer}));
// Log import
D.achats.imports.push({nom:file.name,date:new Date().toISOString().slice(0,10),nbFrns:parsed.length});
// Sync dettes: update existing or add new
parsed.forEach(p=>{
const existing=D.dettes.find(d=>d.nom.toLowerCase().replace(/\s+/g,'')===p.name.toLowerCase().replace(/\s+/g,''));
if(existing){
const totalPaid=existing.paiements?existing.paiements.reduce((s,pp)=>s+pp.montant,0):0;
// Update montant if higher in file
if(p.montantTTC>existing.montant)existing.montant=p.montantTTC;
}
});
await save();
status.innerHTML=`<div class="alrt alrt-i">✅ ${parsed.length} fournisseurs importés depuis "${file.name}"</div>`;
renderAll();
}catch(e){console.error(e);status.innerHTML='<div class="alrt alrt-d">Erreur: '+e.message+'</div>';}
};

// ===== PDF PARSER (Société Générale Maroc) =====
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
window.handlePDF=async(files)=>{
if(!files||!files.length)return;
const res=document.getElementById('pdf-result');
res.innerHTML='<p>⏳ Traitement en cours...</p>';
let allOps=[];let soldePrecedent=null;let soldeFinal=null;let periode='';
for(const file of files){
try{
const buf=await file.arrayBuffer();
const pdf=await pdfjsLib.getDocument({data:buf}).promise;
let fullText='';
for(let i=1;i<=pdf.numPages;i++){
const page=await pdf.getPage(i);
const tc=await page.getTextContent();
fullText+=tc.items.map(x=>x.str).join(' ')+'\n';
}
const perMatch=fullText.match(/Relevé du (\d{2}\/\d{2}\/\d{2}) au (\d{2}\/\d{2}\/\d{2})/);
if(perMatch)periode=perMatch[0];
const spMatch=fullText.match(/Solde précédent[^:]*:\s*([\d\s.,]+)\s*CR/);
if(spMatch&&!soldePrecedent)soldePrecedent=parseMontant(spMatch[1]);
const sfMatch=fullText.match(/Solde au \d{2}\/\d{2}\/\d{2}[^C]*?([\d\s.,]+)\s*CR/);
if(sfMatch)soldeFinal=parseMontant(sfMatch[1]);
const lines=fullText.split('\n');
for(const line of lines){
const parts=line.trim();
if(!parts)continue;
const dateMatch=parts.match(/^(\d{2}\/\d{2})\s+(\d{2}\/\d{2})\s+(.+)/);
if(!dateMatch)continue;
const dateOp=dateMatch[1];
let rest=dateMatch[3];
const amtMatches=[...rest.matchAll(/([\d.]+,\d{2})/g)];
if(!amtMatches.length)continue;
const lastAmt=amtMatches[amtMatches.length-1];
const montant=parseMontant(lastAmt[0]);
const libelle=rest.slice(0,lastAmt.index).trim();
const isCredit=libelle.match(/RECEPTION|ENCAISSEMENT|REMISE/i);
allOps.push({date:dateOp,libelle:libelle.slice(0,80),montant,type:isCredit?'credit':'debit'});
}
}catch(e){console.error('PDF parse error:',e);}
}
if(allOps.length){
const totalDebit=allOps.filter(x=>x.type==='debit').reduce((s,x)=>s+x.montant,0);
const totalCredit=allOps.filter(x=>x.type==='credit').reduce((s,x)=>s+x.montant,0);
let html=`<div class="alrt alrt-i"><b>${periode}</b> — ${allOps.length} opérations détectées | Débits: ${fmtK(totalDebit)} | Crédits: ${fmtK(totalCredit)}</div>`;
if(soldeFinal){html+=`<div class="alrt alrt-w">Solde final relevé: <b>${fmtK(soldeFinal)}</b> — <button class="btn btn-sm btn-p" onclick="D.soldeManuel.comptePrincipal=${soldeFinal};save()">Appliquer au solde principal</button></div>`;}
html+=`<div class="tw" style="max-height:300px;overflow-y:auto"><table><thead><tr><th>Date</th><th>Libellé</th><th style="text-align:right">Débit</th><th style="text-align:right">Crédit</th></tr></thead><tbody>`;
allOps.forEach(o=>{html+=`<tr><td>${o.date}</td><td style="font-size:11px">${o.libelle}</td><td style="text-align:right;color:var(--dgr)">${o.type==='debit'?fmtK(o.montant):''}</td><td style="text-align:right;color:var(--grn)">${o.type==='credit'?fmtK(o.montant):''}</td></tr>`;});
html+=`</tbody></table></div>`;
if(!D.releves)D.releves=[];
D.releves.push({date:new Date().toISOString(),periode,operations:allOps,soldeF:soldeFinal});
save();
res.innerHTML=html;
}else{res.innerHTML='<div class="alrt alrt-d">Aucune opération détectée. Vérifiez le format du PDF.</div>';}
};
function parseMontant(str){return parseFloat(str.replace(/\s/g,'').replace(/\./g,'').replace(',','.'));}

// ===== FIREBASE =====
async function save(){
try{const ref=doc(db,'dashboard','main');await setDoc(ref,JSON.parse(JSON.stringify(D)));setSyncStatus(true);}
catch(e){console.error('Save:',e);setSyncStatus(false);}
}
window.save=save;
function setSyncStatus(ok){document.getElementById('sdot').className='sync-d'+(ok?'':' off');document.getElementById('slab').textContent=ok?'Connecté':'Hors ligne';}
async function initApp(){
const ref=doc(db,'dashboard','main');
try{const snap=await getDoc(ref);if(!snap.exists()){D=seed();await setDoc(ref,D);}else{D=JSON.parse(JSON.stringify(snap.data()));}
ensureData();
setSyncStatus(true);}
catch(e){console.error('Init:',e);setSyncStatus(false);D=seed();ensureData();}
renderAll();
onSnapshot(ref,snap=>{if(snap.exists()){D=JSON.parse(JSON.stringify(snap.data()));ensureData();setSyncStatus(true);renderAll();}},err=>{console.error('Snap:',err);setSyncStatus(false);});
}
// ===== EXPORT/IMPORT =====
window.exportData=()=>{const b=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='declic-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();};
window.importData=(e)=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=async(ev)=>{try{D=JSON.parse(ev.target.result);await save();renderAll();alert('Import réussi !');}catch(err){alert('Erreur: '+err.message);}};r.readAsText(f);};
// ===== START =====
if(sessionStorage.getItem('da')==='1'){document.getElementById('login-screen').style.display='none';document.getElementById('app').style.display='block';initApp();}
</script>
